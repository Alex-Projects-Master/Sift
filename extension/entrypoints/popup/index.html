<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
    }

    .header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header svg {
      width: 20px;
      height: 20px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .loading, .error, .empty {
      padding: 32px 16px;
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    .error { color: #dc2626; }

    .product {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    .product-top {
      display: flex;
      gap: 12px;
    }

    .product-img {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: #f0f0f0;
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-store {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .product-name {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .prices {
      margin-top: 8px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .price-current {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .price-was {
      font-size: 13px;
      color: #999;
      text-decoration: line-through;
    }

    .price-loyalty {
      font-size: 13px;
      font-weight: 600;
      color: #059669;
    }

    .offer-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
    }

    .actions {
      padding: 16px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #1a1a1a;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #e5e5e5;
    }

    .success {
      padding: 16px;
      text-align: center;
      color: #059669;
      font-weight: 500;
    }

    .login-form {
      padding: 16px;
    }

    .login-form input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .login-form input:focus {
      outline: none;
      border-color: #1a1a1a;
    }

    .login-form .error-msg {
      color: #dc2626;
      font-size: 12px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>

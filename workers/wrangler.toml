name = "pricetrackr-api"
main = "index.js"
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
logs = { enabled = true, head_sampling_rate = 1, persist = true, invocation_logs = true }
traces = { enabled = false, persist = true, head_sampling_rate = 1 }

[[d1_databases]]
binding = "DB"
database_name = "pricetrackr"
database_id = "451b6a38-7e22-46e2-89d2-09a5bd1d231e"

# Secrets must be set via CLI (never commit plaintext):
#   npx wrangler secret put ADMIN_SECRET
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put SERPER_API_KEY
#   npx wrangler secret put GEMMA_API_KEY
